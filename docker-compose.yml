# TradingView-IBKR Bridge Docker Compose 配置
# 定義 bridge（Flask 應用程式）與 ib-gateway（IB Gateway 容器）兩個服務
# 敏感環境變數使用 ${VAR} 語法，從 .env 檔案載入

name: tv-ibkr-bridge

services:
  # Bridge 服務：Flask 應用程式，接收 TradingView Webhook 並執行交易
  bridge:
    build: .
    ports:
      - "5000:5000"
    environment:
      # Webhook 驗證密鑰（從 .env 載入）
      - WEBHOOK_TOKEN=${WEBHOOK_TOKEN}
      # IB Gateway 連線設定（透過 Docker 內部網路連線）
      - IB_HOST=ib-gateway
      - IB_PORT=4004
      - IB_CLIENT_ID=1
      # 使用資產比例，預設 95%
      - USE_EQUITY_PCT=0.95
      # Discord 通知 Webhook URL（從 .env 載入）
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    # 等待 ib-gateway 健康檢查通過後才啟動
    depends_on:
      ib-gateway:
        condition: service_healthy

  # IB Gateway 服務：無頭 IB Gateway 容器，維持與 Interactive Brokers 的連線
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:latest
    environment:
      # IB 帳號與密碼（gnzsnz/ib-gateway 映像使用 TWS_USERID/TWS_PASSWORD）
      - TWS_USERID=${IB_ACCOUNT}
      - TWS_PASSWORD=${IB_PASSWORD}
      # 自動接受 API 連線請求（避免無頭模式下彈出確認對話框）
      - TWS_ACCEPT_INCOMING=accept
      # 關閉 Read-Only API 模式，允許下單
      - READ_ONLY_API=no
      # 交易模式：paper（模擬）或 live（實盤）
      - TRADING_MODE=paper
    volumes:
      # 掛載自訂 IBC config，設定 TrustedTwsApiClientIPs 允許 Docker 內部網路
      - ./ibc_config.ini.tmpl:/home/ibgateway/ibc/config.ini.tmpl:ro
    # 啟動前刪除舊的 jts.ini，讓 IBC 從 template 重新生成（含 TrustedIPs=0.0.0.0/0）
    command: bash -c "rm -f /home/ibgateway/Jts/jts.ini && exec /home/ibgateway/scripts/run.sh"
    # 健康檢查：確認 IB Gateway TWS API 已在 4002 埠就緒
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/4004"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    ports:
      - "4002:4004"
